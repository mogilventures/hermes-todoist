name: Todoist E2E

on:
  workflow_dispatch:
  push:
    branches:
      - agent/full-crud

permissions:
  contents: read

concurrency:
  group: todoist-e2e-${{ github.repository }}
  cancel-in-progress: false

jobs:
  live-api:
    name: All Hermes Todoist operations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: todoist-e2e
    env:
      HERMES_TODOIST_E2E: "1"
      TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Verify environment secret is available
        shell: bash
        run: |
          if [[ -z "${TODOIST_API_TOKEN}" ]]; then
            echo "TODOIST_API_TOKEN is not configured in the todoist-e2e environment." >&2
            exit 1
          fi

      - name: Run unit tests
        run: pytest -m "not e2e"

      - name: Run live Todoist E2E tests
        run: pytest -v -m e2e tests/e2e
