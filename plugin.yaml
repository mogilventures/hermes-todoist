name: todoist
version: 0.2.0
description: Local/personal-token Todoist plugin for Hermes with full task, project, section, label, and comment management, hard delete confirmation, pagination, and no hosted OAuth startup prompts.
author: Mogil Ventures
homepage: https://github.com/mogilventures/hermes-todoist
license: MIT

provides_tools:
  - todoist_list_tasks
  - todoist_get_task
  - todoist_create_task
  - todoist_update_task
  - todoist_move_task
  - todoist_reorder_tasks
  - todoist_complete_task
  - todoist_reopen_task
  - todoist_delete_task
  - todoist_list_projects
  - todoist_get_project
  - todoist_create_project
  - todoist_update_project
  - todoist_move_project
  - todoist_reorder_projects
  - todoist_archive_project
  - todoist_unarchive_project
  - todoist_delete_project
  - todoist_list_sections
  - todoist_get_section
  - todoist_create_section
  - todoist_update_section
  - todoist_move_section
  - todoist_reorder_sections
  - todoist_archive_section
  - todoist_unarchive_section
  - todoist_delete_section
  - todoist_list_labels
  - todoist_get_label
  - todoist_create_label
  - todoist_update_label
  - todoist_delete_label
  - todoist_add_comment
  - todoist_list_comments
  - todoist_get_comment
  - todoist_update_comment
  - todoist_delete_comment
  - todoist_find_duplicate_tasks
  - todoist_create_or_update_task

requires_env:
  - name: TODOIST_API_TOKEN
    description: "Todoist API token (Settings → Integrations → Developer → API token)"
    url: "https://app.todoist.com/app/settings/integrations/developer"
    secret: true
